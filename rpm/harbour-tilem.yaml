Name: harbour-tilem
Summary: TI Calculator Emulator for SailfishOS
Version: 0.3.0
Release: 1
Group: Applications/Productivity
URL: https://github.com/labsin/TilEm-Qml
License: GPLv3+ and LGPLv2+
Sources:
  - '%{name}-%{version}.tar.bz2'
Description: |
  TilEm is an emulator for Texas Instruments Z80-based graphing calculators.

  Supported models:
  - TI-73 / TI-73 Explorer
  - TI-76.fr
  - TI-81
  - TI-82 / TI-82 STATS
  - TI-83 / TI-83 Plus / TI-83 Plus Silver Edition
  - TI-84 Plus / TI-84 Plus Silver Edition
  - TI-85
  - TI-86

  Note: You need a calculator ROM image to use this emulator. ROM images are
  copyrighted by Texas Instruments and cannot be distributed.

Configure: none
Builder: qtc5

QMakeOptions:
  - VERSION=%{version}
  - RELEASE=%{release}

PkgConfigBR:
  - Qt5Core
  - Qt5Qml
  - Qt5Quick
  - sailfishapp >= 1.0.2
  - glib-2.0
  - gobject-2.0
  - gdk-pixbuf-2.0
  - ticalcs2
  - ticonv

Requires:
  - sailfishsilica-qt5 >= 0.10.9
  - qt5-qtdeclarative-import-folderlistmodel

Files:
  - '%{_bindir}/%{name}'
  - '%{_datadir}/%{name}'
  - '%{_datadir}/applications/%{name}.desktop'
  - '%{_datadir}/icons/hicolor/*/apps/%{name}.png'

# Sailjail sandboxing permissions
Custom:
  - |
    [X-Sailjail]
    Permissions=Documents;Downloads;RemovableMedia;UserDirs
    OrganizationName=harbour-tilem
    ApplicationName=tilem
